<!DOCTYPE html>
<html lang="th">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #00e1e9, #0bbb9e);
}

.gallery {
    display: flex;
    flex-direction: column;
    gap: 25px;
    padding: 30px;
}

/* HERO (รูปหัว) */
.hero img {
    width: 100%;
    display: block;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px 10px;
    color: #584c4c;
    backdrop-filter: blur(10px);
}

.header h1 {
  font-size: 36px;
  background: linear-gradient(45deg, #ffffff, #ffe6f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CARD */
.card {
    background: white;
    border-radius: 25px;
    padding: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15),
                0 0 20px rgba(255,255,255,0.3);
}

/* IMAGE */
.card img {
    width: 100%;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.card img:active {
    transform: scale(0.95);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 20px;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}
.gallery {
    display: flex;
    flex-direction: column;
    gap: 25px;
    padding: 30px;
    max-width: 600px;
    margin: auto;
}

  .card {
    border-radius: 20px;
    padding: 10px;
  }

  .card img {
    border-radius: 15px;
  }

  .header h1 {
    font-size: 26px;
  }

.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<!-- 💖 รูปหัว (เปลี่ยนชื่อไฟล์เอง) -->
<section class="hero">
  <img src="4-04.png" alt="Price Header">
</section>

<!-- HEADER TEXT -->
<div class="header">
    <h1>💖Price rate💖</h1>
</div>

<!-- GALLERY -->
<div class="gallery">

    <div class="card">
        <img src="เรทราคา new 01.png" class="clickable">
    </div>

    <div class="card">
        <img src="เรทราคา new 02.png" class="clickable">
    </div>

    <div class="card">
        <img src="เรทราคา สติ๊กเกอร์-02.jpg" class="clickable">
    </div>

    <div class="card">
        <img src="เวลาทำการ.png" class="clickable">
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img id="modal-img">
</div>

<script>
const images = document.querySelectorAll('.clickable');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');

images.forEach(img => {
  img.addEventListener('click', () => {
    modal.style.display = 'flex';
    modalImg.src = img.src;
  });
});

function closeModal() {
  modal.style.display = 'none';
}

modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    closeModal();
  }
});
</script>

</body>
</html>
